<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaSave Pro | Cyberpunk Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --neon-red: #ff0050;
            --dark-bg: #0d0d0d;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a0a0a 0%, #0d0d0d 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 80, 0.3);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(255, 0, 80, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .input-group {
            margin: 30px 0;
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 0, 80, 0.2);
        }

        .download-btn {
            width: 100%;
            padding: 15px;
            background: var(--neon-red);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 15px;
        }

        .download-btn:hover {
            box-shadow: 0 0 20px var(--neon-red);
            transform: translateY(-2px);
        }

        #resultArea {
            display: none;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        video {
            width: 100%;
            border-radius: 10px;
            border: 1px solid var(--neon-red);
            margin-bottom: 20px;
        }

        .save-btn {
            background: #00ff88;
            color: black;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }

        .loader {
            display: none;
            color: var(--neon-red);
            margin: 20px 0;
        }

        .fa-spin { margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo"><i class="fab fa-instagram"></i> NEON SAVE</div>
    <p>Premium Reel Downloader | 1080p HD</p>

    <div class="input-group">
        <input type="text" id="urlInput" placeholder="Paste Instagram Reel Link...">
        <button id="downloadBtn" class="download-btn" onclick="handleDownload()">
            Fetch Video
        </button>
    </div>

    <div id="loader" class="loader">
        <i class="fas fa-circle-notch fa-spin"></i> Bypassing Instagram Security...
    </div>

    <div id="resultArea">
        <video id="videoPreview" controls></video>
        <br>
        <a id="finalDownload" href="#" target="_blank" class="save-btn">
            <i class="fas fa-download"></i> Save to Gallery
        </a>
    </div>
</div>

<script>
    async function handleDownload() {
        const url = document.getElementById('urlInput').value;
        const btn = document.getElementById('downloadBtn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('resultArea');
        const video = document.getElementById('videoPreview');
        const downloadLink = document.getElementById('finalDownload');

        if (!url.includes("instagram.com")) {
            alert("Please enter a valid Instagram URL");
            return;
        }

        btn.disabled = true;
        loader.style.display = "block";
        result.style.display = "none";

        try {
            // Method: Using a rapid-response worker API (Updated for 2026)
            // Note: Hum multiple fallback APIs try kar rahe hain
            const response = await fetch(`https://api.vkrhost.com/api/instavideo.php?url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if (data.data && data.data[0].url) {
                const videoUrl = data.data[0].url;
                video.src = videoUrl;
                downloadLink.href = videoUrl;
                
                result.style.display = "block";
                video.play();
            } else {
                throw new Error("Private or Invalid Reel");
            }
        } catch (error) {
            alert("Error: Instagram blocked this request. Please try again in 5 seconds or check if the reel is public.");
            console.error(error);
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
