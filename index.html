<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonThumb | Insta Pro Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --neon: #ff0050; --bg: #080808; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 450px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--neon); padding: 30px; border-radius: 20px; box-shadow: 0 0 25px rgba(255, 0, 80, 0.15); text-align: center; backdrop-filter: blur(10px); }
        .logo { font-size: 2.2rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 5px; text-transform: uppercase; font-weight: 800; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 12px; outline: none; box-sizing: border-box; margin-bottom: 15px; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(255, 0, 80, 0.2); }
        .btn { width: 100%; padding: 15px; background: var(--neon); border: none; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--neon); }
        #loader { display: none; margin: 20px 0; color: var(--neon); font-weight: bold; }
        #resultArea { display: none; margin-top: 25px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; }
        video { width: 100%; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; }
        .save-btn { display: block; width: 100%; padding: 15px; background: #00ff88; color: #000; text-decoration: none; font-weight: 800; border-radius: 10px; text-transform: uppercase; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">NEON SAVE</div>
    <p>100% Working | Direct Gallery Download</p>
    
    <input type="text" id="reelUrl" placeholder="Paste Instagram Reel Link...">
    <button class="btn" id="mainBtn" onclick="fetchVideo()">Get Video Link</button>

    <div id="loader"><i class="fas fa-spinner fa-spin"></i> BYPASSING INSTAGRAM...</div>

    <div id="resultArea">
        <video id="preview" controls></video>
        <button id="downloadLink" class="save-btn" onclick="forceDownload()">
            <i class="fas fa-cloud-download-alt"></i> Save to Gallery
        </button>
    </div>
</div>

<script>
    let globalVideoUrl = "";

    async function fetchVideo() {
        const url = document.getElementById('reelUrl').value;
        const loader = document.getElementById('loader');
        const result = document.getElementById('resultArea');
        const btn = document.getElementById('mainBtn');

        if(!url.includes("instagram.com")) return alert("Please paste a valid Instagram link!");

        btn.disabled = true;
        loader.style.display = "block";
        result.style.display = "none";

        try {
            // High-End API Endpoint (More stable than old methods)
            const response = await fetch(`https://api.vkrhost.com/api/instavideo.php?url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if(data.data && data.data[0].url) {
                globalVideoUrl = data.data[0].url;
                document.getElementById('preview').src = globalVideoUrl;
                loader.style.display = "none";
                result.style.display = "block";
                btn.disabled = false;
            } else {
                throw new Error("API Limit reached");
            }
        } catch (e) {
            alert("This API is busy. Switching to Master Method...");
            // Backup Method: Direct window if API fails
            window.open(`https://snapinsta.app/results?url=${url}`, '_blank');
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    // GALLERY MEIN DIRECT SAVE KARNE KA MAGIC CODE
    async function forceDownload() {
        const dlBtn = document.getElementById('downloadLink');
        const originalText = dlBtn.innerHTML;
        dlBtn.innerHTML = "Downloading to Phone...";
        dlBtn.style.background = "#fff";

        try {
            const response = await fetch(globalVideoUrl);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = blobUrl;
            a.download = `InstaReel_${Date.now()}.mp4`; // File name
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(blobUrl);
            
            dlBtn.innerHTML = "✓ Saved Successfully!";
            dlBtn.style.background = "#00ff88";
        } catch (error) {
            // Agar blob block ho toh direct link open kar do
            window.open(globalVideoUrl, '_blank');
            dlBtn.innerHTML = "Direct Link Opened";
        }
    }
</script>

</body>
</html>
