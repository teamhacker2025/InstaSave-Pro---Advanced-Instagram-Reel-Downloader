<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonSave Pro | Final Fix 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --neon: #ff0050; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; padding: 40px; border: 2px solid var(--neon); border-radius: 20px; background: #000; box-shadow: 0 0 35px rgba(255,0,80,0.5); text-align: center; }
        .logo { font-size: 2.5rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); font-weight: 800; margin-bottom: 10px; }
        .desc { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        
        /* Form Styling */
        form { display: flex; flex-direction: column; gap: 15px; }
        input[type="text"] { 
            width: 100%; padding: 15px; background: #111; border: 1px solid #333; 
            color: white; border-radius: 12px; outline: none; box-sizing: border-box;
            border-left: 5px solid var(--neon); font-size: 1rem;
        }
        button { 
            width: 100%; padding: 16px; background: var(--neon); border: none; 
            color: white; font-weight: bold; cursor: pointer; border-radius: 12px; 
            text-transform: uppercase; font-size: 1.1rem; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255,0,80,0.3);
        }
        button:hover { background: #fff; color: var(--neon); transform: scale(1.02); }
        
        .features { margin-top: 30px; display: flex; justify-content: space-around; font-size: 0.75rem; color: #555; }
        .features span { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .features i { color: var(--neon); font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">NEON SAVE</div>
    <p class="desc">Direct Gallery Download | No API Needed</p>
    
    <form action="https://saveig.app/api/ajaxSearch" method="POST" target="_blank" onsubmit="return validate()">
        <input type="hidden" name="t" value="media">
        <input type="hidden" name="lang" value="en">
        <input type="text" name="q" id="reelUrl" placeholder="Paste Instagram Reel Link..." required>
        
        <button type="submit">
            <i class="fas fa-download"></i> DOWNLOAD TO GALLERY
        </button>
    </form>

    <div class="features">
        <span><i class="fas fa-bolt"></i> FAST</span>
        <span><i class="fas fa-shield-alt"></i> SECURE</span>
        <span><i class="fas fa-hdd"></i> 4K HD</span>
    </div>
</div>

<script>
    function validate() {
        const url = document.getElementById('reelUrl').value;
        if (!url.includes("instagram.com")) {
            alert("Bhai, valid Instagram link dalo!");
            return false;
        }
        // Button text change for feedback
        document.querySelector('button').innerHTML = "<i class='fas fa-sync fa-spin'></i> PROCESSING...";
        return true;
    }
</script>

</body>
</html>
